spring:
  application:
    name: amena-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/amena
    username: amena
    password: amena123
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

server:
  port: 8081

amena:
  storage:
    upload-dir: uploads
    public-base-path: /uploads
    max-file-size-bytes: 5242880
    allowed-content-types:
      - image/jpeg
      - image/png
      - image/webp
      - image/gif

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.amena: DEBUG
    org.hibernate.SQL: DEBUG
    liquibase: INFO