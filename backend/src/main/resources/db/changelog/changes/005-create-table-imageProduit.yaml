databaseChangeLog:
  - changeSet:
      id: 004
      author: amena
      description: Create product_images table

      changes:
        - createTable:
            tableName: product_images
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: product_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: image_url
                  type: VARCHAR(500)
                  constraints:
                    nullable: false

              - column:
                  name: alt_text
                  type: VARCHAR(255)

              - column:
                  name: sort_order
                  type: INT
                  defaultValueNumeric: 0

              - column:
                  name: is_primary
                  type: BOOLEAN
                  defaultValueBoolean: false

              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP

        - addForeignKeyConstraint:
            baseTableName: product_images
            baseColumnNames: product_id
            referencedTableName: produits
            referencedColumnNames: id
            constraintName: fk_product_images_product
            onDelete: CASCADE

        - createIndex:
            tableName: product_images
            indexName: idx_product_images_product
            columns:
              - column:
                  name: product_id