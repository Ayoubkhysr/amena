databaseChangeLog:
  - changeSet:
      id: 007
      author: amena
      description: Create carts table

      changes:
        - createTable:
            tableName: carts
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: user_id
                  type: BIGINT

              - column:
                  name: session_id
                  type: VARCHAR(255)

              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP

              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP

              - column:
                  name: expires_at
                  type: TIMESTAMP

        - addForeignKeyConstraint:
            baseTableName: carts
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_carts_user
            onDelete: CASCADE

        - createIndex:
            tableName: carts
            indexName: idx_carts_user
            columns:
              - column:
                  name: user_id

        - createIndex:
            tableName: carts
            indexName: idx_carts_session
            columns:
              - column:
                  name: session_id