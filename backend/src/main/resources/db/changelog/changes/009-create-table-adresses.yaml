databaseChangeLog:
  - changeSet:
      id: 009
      author: amena
      description: Create addresses table

      changes:
        - createTable:
            tableName: addresses
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: street_address
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: city
                  type: VARCHAR(100)
                  constraints:
                    nullable: false

              - column:
                  name: state
                  type: VARCHAR(100)

              - column:
                  name: postal_code
                  type: VARCHAR(20)
                  constraints:
                    nullable: false

              - column:
                  name: country
                  type: VARCHAR(100)
                  constraints:
                    nullable: false

              - column:
                  name: is_default
                  type: BOOLEAN
                  defaultValueBoolean: false

              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP

        - addForeignKeyConstraint:
            baseTableName: addresses
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_addresses_user
            onDelete: CASCADE

        - createIndex:
            tableName: addresses
            indexName: idx_addresses_user
            columns:
              - column:
                  name: user_id