openapi: 3.1.0
info:
  title: Amena Backend API
  description: API specification for the Amena Backend Service
  version: 1.0.0
  contact:
    name: Amena Team
    email: support@amena.com

servers:
  - url: http://localhost:8081
    description: Development server

tags:
  - name: Health
    description: Health check endpoints
  - name: Users
    description: User management operations
  - name: Products
    description: Product management operations
  - name: Categories
    description: Product category management operations
  - name: Orders
    description: Order management operations
  - name: Coupons
    description: Coupon / promo code management operations
  - name: Offres
    description: Category-based discount offer management operations
  - name: Dashboard
    description: Dashboard analytics operations

paths:

  /api/dashboard/stats:
    get:
      tags:
        - Dashboard
      summary: Get dashboard statistics
      operationId: getDashboardStats
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStatsResponse"
  /api/health:
    get:
      tags:
        - Health
      summary: Health check endpoint
      description: Returns the health status of the service
      operationId: getHealth
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/users:
    get:
      tags:
        - Users
      summary: List all users
      description: Returns a paginated list of users
      operationId: getUsers
      parameters:
        - name: page
          in: query
          description: Page number (0-indexed)
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: size
          in: query
          description: Page size
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPage"
    post:
      tags:
        - Users
      summary: Create a new user
      description: Creates a new user with the provided details
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: User with this email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/users/{userId}:
    get:
      tags:
        - Users
      summary: Get user by ID
      description: Returns a single user by their ID
      operationId: getUserById
      parameters:
        - name: userId
          in: path
          required: true
          description: The user's unique identifier
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: User found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      tags:
        - Users
      summary: Update user
      description: Updates an existing user's details
      operationId: updateUser
      parameters:
        - name: userId
          in: path
          required: true
          description: The user's unique identifier
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: User updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags:
        - Users
      summary: Delete user
      description: Deletes a user by their ID
      operationId: deleteUser
      parameters:
        - name: userId
          in: path
          required: true
          description: The user's unique identifier
          schema:
            type: integer
            format: int64
      responses:
        "204":
          description: User deleted successfully
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/products:
    get:
      tags:
        - Products
      summary: List all products with pagination and filtering
      operationId: getProducts
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: categoryId
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - name: sortBy
          in: query
          schema:
            type: string
            default: "createdAt"
        - name: sortOrder
          in: query
          schema:
            type: string
            default: "desc"
      responses:
        "200":
          description: Paginated list of products
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductPage"
    post:
      tags:
        - Products
      summary: Create a new product
      operationId: createProduct
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductRequest"
      responses:
        "201":
          description: Product created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductResponse"

  /api/products/{productId}:
    get:
      tags:
        - Products
      summary: Get product by ID
      operationId: getProductById
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Product found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductResponse"
        "404":
          description: Product not found
    put:
      tags:
        - Products
      summary: Update product
      operationId: updateProduct
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductRequest"
      responses:
        "200":
          description: Product updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductResponse"
        "404":
          description: Product not found
    delete:
      tags:
        - Products
      summary: Delete product
      operationId: deleteProduct
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "204":
          description: Product deleted successfully
        "404":
          description: Product not found

  /api/categories:
    get:
      tags:
        - Categories
      summary: List all categories
      operationId: getCategories
      responses:
        "200":
          description: List of all categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryResponse"
    post:
      tags:
        - Categories
      summary: Create a new category
      operationId: createCategory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryRequest"
      responses:
        "201":
          description: Category created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryResponse"

  /api/categories/{categoryId}:
    get:
      tags:
        - Categories
      summary: Get category by ID
      operationId: getCategoryById
      parameters:
        - name: categoryId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Category found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryResponse"
        "404":
          description: Category not found
    put:
      tags:
        - Categories
      summary: Update category
      operationId: updateCategory
      parameters:
        - name: categoryId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryRequest"
      responses:
        "200":
          description: Category updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryResponse"
        "404":
          description: Category not found
    delete:
      tags:
        - Categories
      summary: Delete category
      operationId: deleteCategory
      parameters:
        - name: categoryId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "204":
          description: Category deleted successfully
        "404":
          description: Category not found

  /api/orders:
    get:
      tags:
        - Orders
      summary: List all orders with pagination and filtering
      operationId: getOrders
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
        - name: sortBy
          in: query
          schema:
            type: string
            default: "createdAt"
        - name: sortOrder
          in: query
          schema:
            type: string
            default: "desc"
      responses:
        "200":
          description: Paginated list of orders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderPage"

  /api/orders/{orderId}:
    get:
      tags:
        - Orders
      summary: Get order by ID
      operationId: getOrderById
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Order found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderResponse"
        "404":
          description: Order not found

  /api/orders/{orderId}/status:
    put:
      tags:
        - Orders
      summary: Update order status
      operationId: updateOrderStatus
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderStatusUpdateRequest"
      responses:
        "200":
          description: Order status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderResponse"
        "404":
          description: Order not found

  /api/coupons:
    get:
      tags:
        - Coupons
      summary: List all coupons
      operationId: getCoupons
      responses:
        "200":
          description: List of all coupons
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CouponResponse"
    post:
      tags:
        - Coupons
      summary: Create a new coupon
      operationId: createCoupon
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CouponRequest"
      responses:
        "201":
          description: Coupon created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CouponResponse"
        "409":
          description: Coupon code already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/coupons/{couponId}:
    get:
      tags:
        - Coupons
      summary: Get coupon by ID
      operationId: getCouponById
      parameters:
        - name: couponId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Coupon found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CouponResponse"
        "404":
          description: Coupon not found
    put:
      tags:
        - Coupons
      summary: Update coupon
      operationId: updateCoupon
      parameters:
        - name: couponId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CouponRequest"
      responses:
        "200":
          description: Coupon updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CouponResponse"
        "404":
          description: Coupon not found
    delete:
      tags:
        - Coupons
      summary: Delete coupon
      operationId: deleteCoupon
      parameters:
        - name: couponId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "204":
          description: Coupon deleted successfully
        "404":
          description: Coupon not found

  /api/offres:
    get:
      tags:
        - Offres
      summary: List all offres
      operationId: getOffres
      responses:
        "200":
          description: List of all offres
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OffreResponse"
    post:
      tags:
        - Offres
      summary: Create a new offre
      operationId: createOffre
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OffreRequest"
      responses:
        "201":
          description: Offre created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OffreResponse"

  /api/offres/{offreId}:
    get:
      tags:
        - Offres
      summary: Get offre by ID
      operationId: getOffreById
      parameters:
        - name: offreId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Offre found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OffreResponse"
        "404":
          description: Offre not found
    put:
      tags:
        - Offres
      summary: Update offre
      operationId: updateOffre
      parameters:
        - name: offreId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OffreRequest"
      responses:
        "200":
          description: Offre updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OffreResponse"
        "404":
          description: Offre not found
    delete:
      tags:
        - Offres
      summary: Delete offre
      operationId: deleteOffre
      parameters:
        - name: offreId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "204":
          description: Offre deleted successfully
        "404":
          description: Offre not found

components:
  schemas:





    DashboardStatsResponse:
      type: object
      required:
        - totalSales
        - ordersToday
        - newClients
        - lowStockCount
      properties:
        totalSales:
          type: number
          format: double
        ordersToday:
          type: integer
        newClients:
          type: integer
        lowStockCount:
          type: integer

    ProductPage:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/ProductResponse"
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
        size:
          type: integer
        number:
          type: integer
        first:
          type: boolean
        last:
          type: boolean
        empty:
          type: boolean

    OrderPage:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/OrderResponse"
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
        size:
          type: integer
        number:
          type: integer
        first:
          type: boolean
        last:
          type: boolean
        empty:
          type: boolean
    HealthResponse:
      type: object
      required:
        - service
      properties:
        service:
          type: string
          description: Name of the service
          example: amena-backend

    UserResponse:
      type: object
      required:
        - id
        - email
        - firstName
        - lastName
        - createdAt
      properties:
        id:
          type: integer
          format: int64
          description: Unique identifier
        email:
          type: string
          format: email
          description: User's email address
        firstName:
          type: string
          description: User's first name
          minLength: 1
          maxLength: 100
        lastName:
          type: string
          description: User's last name
          minLength: 1
          maxLength: 100
        createdAt:
          type: string
          format: date-time
          description: Account creation timestamp
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp

    ProductResponse:
      type: object
      required:
        - id
        - sku
        - name
        - slug
        - price
      properties:
        id:
          type: integer
          format: int64
        sku:
          type: string
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        price:
          type: number
          format: double
        compareAtPrice:
          type: number
          format: double
        costPrice:
          type: number
          format: double
        categoryId:
          type: integer
          format: int64
        subcategory:
          type: string
        brand:
          type: string
        weight:
          type: number
          format: double
        isActive:
          type: boolean
        isFeatured:
          type: boolean
        metaTitle:
          type: string
        metaDescription:
          type: string
        imageUrl:
          type: string
          description: Public URL of the primary product image
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CategoryResponse:
      type: object
      required:
        - id
        - name
        - slug
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        parentId:
          type: integer
          format: int64
        subcategory:
          type: string
        imageUrl:
          type: string
        isActive:
          type: boolean
        sortOrder:
          type: integer
        createdAt:
          type: string
          format: date-time
        productCount:
          type: integer

    OrderItemResponse:
      type: object
      required:
        - productName
        - quantity
        - unitPrice
        - totalPrice
      properties:
        productName:
          type: string
        quantity:
          type: integer
        unitPrice:
          type: number
          format: double
        totalPrice:
          type: number
          format: double

    OrderResponse:
      type: object
      required:
        - id
        - orderNumber
        - clientName
        - totalAmount
        - status
        - createdAt
        - items
      properties:
        id:
          type: integer
          format: int64
        orderNumber:
          type: string
        clientName:
          type: string
        userId:
          type: integer
          format: int64
        totalAmount:
          type: number
          format: double
        shippingAmount:
          type: number
          format: double
        status:
          type: string
        createdAt:
          type: string
          format: date-time
        address:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItemResponse"

    OrderStatusUpdateRequest:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          description: pending, processing, shipped, delivered, cancelled, refunded

    CategoryRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        parentId:
          type: integer
          format: int64
        subcategory:
          type: string
        imageUrl:
          type: string
        isActive:
          type: boolean
        sortOrder:
          type: integer

    ProductRequest:
      type: object
      required:
        - sku
        - name
        - slug
        - price
      properties:
        sku:
          type: string
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        price:
          type: number
          format: double
        compareAtPrice:
          type: number
          format: double
        costPrice:
          type: number
          format: double
        categoryId:
          type: integer
          format: int64
        subcategory:
          type: string
        brand:
          type: string
        weight:
          type: number
          format: double
        isActive:
          type: boolean
        isFeatured:
          type: boolean
        metaTitle:
          type: string
        metaDescription:
          type: string

    CreateUserRequest:
      type: object
      required:
        - email
        - firstName
        - lastName
      properties:
        email:
          type: string
          format: email
          description: User's email address
        firstName:
          type: string
          description: User's first name
          minLength: 1
          maxLength: 100
        lastName:
          type: string
          description: User's last name
          minLength: 1
          maxLength: 100

    UpdateUserRequest:
      type: object
      properties:
        firstName:
          type: string
          description: User's first name
          minLength: 1
          maxLength: 100
        lastName:
          type: string
          description: User's last name
          minLength: 1
          maxLength: 100
        email:
          type: string
          format: email
          description: User's email address

    UserPage:
      type: object
      required:
        - content
        - totalElements
        - totalPages
        - number
        - size
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/UserResponse"
        totalElements:
          type: integer
          format: int64
          description: Total number of elements
        totalPages:
          type: integer
          description: Total number of pages
        number:
          type: integer
          description: Current page number (0-indexed)
        size:
          type: integer
          description: Page size
        first:
          type: boolean
          description: Whether this is the first page
        last:
          type: boolean
          description: Whether this is the last page
        empty:
          type: boolean
          description: Whether the page is empty

    ErrorResponse:
      type: object
      required:
        - timestamp
        - status
        - error
        - message
        - path
      properties:
        timestamp:
          type: string
          format: date-time
          description: Error occurrence timestamp
        status:
          type: integer
          description: HTTP status code
        error:
          type: string
          description: Error type
        message:
          type: string
          description: Detailed error message
        path:
          type: string
          description: Request path that caused the error

    CouponResponse:
      type: object
      required:
        - id
        - code
        - discountType
        - discountValue
        - isActive
      properties:
        id:
          type: integer
          format: int64
        code:
          type: string
        description:
          type: string
        discountType:
          type: string
          description: "percentage or fixed_amount"
        discountValue:
          type: number
          format: double
        minimumOrderAmount:
          type: number
          format: double
        maximumDiscount:
          type: number
          format: double
        usageLimit:
          type: integer
        usedCount:
          type: integer
        startsAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time

    CouponRequest:
      type: object
      required:
        - code
        - discountType
        - discountValue
      properties:
        code:
          type: string
        description:
          type: string
        discountType:
          type: string
          description: "percentage or fixed_amount"
        discountValue:
          type: number
          format: double
        minimumOrderAmount:
          type: number
          format: double
        maximumDiscount:
          type: number
          format: double
