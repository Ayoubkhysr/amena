services:
  postgres:
    image: postgres:16-alpine
    container_name: amena-postgres
    environment:
      POSTGRES_DB: amena
      POSTGRES_USER: amena
      POSTGRES_PASSWORD: amena123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U amena -d amena"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: amena-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/amena
      SPRING_DATASOURCE_USERNAME: amena
      SPRING_DATASOURCE_PASSWORD: amena123
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    container_name: amena-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data: